name: evently_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase و Google Sign-In
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  google_sign_in: 6.2.1


  # حزم إضافية
  provider: ^6.1.5+1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.1.0+1
  easy_localization: ^3.0.8
  toggle_switch: ^2.3.0
  country_icons: ^3.0.0
  font_awesome_flutter: ^10.11.0
  shimmer: ^3.0.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
